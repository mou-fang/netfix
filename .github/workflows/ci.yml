name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linux: 只构建和测试跨平台的 Core + net10.0 测试
  linux-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build Core
        run: dotnet build src/NetMedic.Core/NetMedic.Core.csproj --configuration Debug
      - name: Build Tests (net10.0)
        run: dotnet build tests/NetMedic.Tests/NetMedic.Tests.csproj -f net10.0 --configuration Debug
      - name: Test (net10.0, no integration, no public network)
        run: dotnet test tests/NetMedic.Tests/NetMedic.Tests.csproj -f net10.0 --configuration Debug --no-build

  # Windows: 构建整个 solution + net10.0-windows 测试
  windows-full:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Format check
        run: dotnet format NetMedic.slnx --verify-no-changes --verbosity minimal
      - name: Build solution
        run: dotnet build NetMedic.slnx --configuration Debug
      - name: Test (net10.0, no integration)
        run: dotnet test tests/NetMedic.Tests/NetMedic.Tests.csproj -f net10.0 --configuration Debug --no-build
      - name: Test (net10.0-windows, no integration)
        run: dotnet test tests/NetMedic.Tests/NetMedic.Tests.csproj -f net10.0-windows --configuration Debug --no-build
