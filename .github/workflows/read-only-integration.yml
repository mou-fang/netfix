name: Read-Only Integration

on:
  workflow_dispatch:

jobs:
  windows-integration:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build NetMedic.slnx --configuration Debug
      - name: Run read-only integration tests
        env:
          NETMEDIC_INTEGRATION_TESTS: '1'
        run: dotnet test tests/NetMedic.Tests/NetMedic.Tests.csproj -f net10.0-windows --configuration Debug --no-build --verbosity normal
